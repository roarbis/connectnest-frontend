cn_dark:
  card-mod-theme: cn_dark
  card-mod-sidebar-yaml: |
    .: |
      .menu .title {
        display: none !important;
      }
      .menu:before {
        content: "";
        display: block;
        width: 52px;
        height: 52px;
        background: url('/static/icons/cn-icon-96.png') no-repeat center;
        background-size: contain;
        margin: 14px auto 4px;
        border-radius: 14px;
      }
      .menu:after {
        content: "Connect Hub";
        margin-left: 1px;
        color: rgba(60,139,140,1);
        background-color: rgba(205,218,218,1);
        display: block;
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        font-size: 30px;
        font-family: baumans;
      }
  # Global
  background-image: "center / cover no-repeat fixed url('/cn-bg.png')"
  lovelace-background: var(--background-image)
  # Fonts
  primary-font-family: "Raleway,sans-serif"
  paper-font-common-base_-_font-family: "var(--primary-font-family)"
  paper-font-common-code_-_font-family: "var(--primary-font-family)"
  paper-font-body1_-_font-family: "var(--primary-font-family)"
  paper-font-subhead_-_font-family: "var(--primary-font-family)"
  paper-font-headline_-_font-family: "var(--primary-font-family)"
  paper-font-caption_-_font-family: "var(--primary-font-family)"
  paper-font-title_-_font-family: "var(--primary-font-family)"
  ha-card-header-font-family: "var(--primary-font-family)"
  # Text
  text-color: "#ffffff"
  primary-text-color: "var(--text-color)"
  text-primary-color: "var(--text-color)"
  secondary-text-color: "#BAC0C6"
  text-medium-light-color: "#A0A2A8"
  text-medium-color: "#80828A"
  disabled-text-color: "#626569"
  primary-color: "var(--accent-color)"
  # ─── Text Fields, Dropdowns, Selects ─────────────────────
  # Aggressive coverage: HA 2024+ uses both legacy mdc-* and modern
  # mwc-* / direct CSS variables. Setting all of them with explicit
  # dark fills + white text guarantees legibility regardless of which
  # widget version a given panel renders.
  mdc-text-field-fill-color: "rgba(20, 22, 26, 0.9)"
  mdc-text-field-ink-color: "#ffffff"
  mdc-text-field-label-ink-color: "rgba(255, 255, 255, 0.72)"
  mdc-text-field-idle-line-color: "rgba(255, 255, 255, 0.18)"
  mdc-text-field-hover-line-color: "var(--accent-color)"
  mdc-select-fill-color: "rgba(20, 22, 26, 0.9)"
  mdc-select-ink-color: "#ffffff"
  mdc-select-label-ink-color: "rgba(255, 255, 255, 0.72)"
  mdc-select-idle-line-color: "rgba(255, 255, 255, 0.18)"
  mdc-select-hover-line-color: "var(--accent-color)"
  mdc-select-dropdown-icon-color: "rgba(255, 255, 255, 0.72)"
  mdc-menu-surface-fill-color: "rgba(28, 32, 38, 0.98)"
  mdc-theme-on-surface: "#ffffff"
  mdc-theme-text-primary-on-background: "#ffffff"
  mdc-theme-text-secondary-on-background: "rgba(255, 255, 255, 0.72)"
  input-fill-color: "rgba(20, 22, 26, 0.9)"
  input-ink-color: "#ffffff"
  input-label-ink-color: "rgba(255, 255, 255, 0.72)"
  input-disabled-fill-color: "rgba(20, 22, 26, 0.5)"
  input-disabled-ink-color: "rgba(255, 255, 255, 0.36)"
  input-disabled-label-ink-color: "rgba(255, 255, 255, 0.36)"
  input-idle-line-color: "rgba(255, 255, 255, 0.18)"
  input-dropdown-icon-color: "rgba(255, 255, 255, 0.72)"
  input-hover-line-color: "var(--primary-color)"
  code-editor-background-color: "var(--ha-card-background)"
  codemirror-property: "var(--accent-color)"
  # Main Colors
  app-header-background-color: "#3c8b8c"
  accent-color: "#15C7B4"
  accent-medium-color: "var(--accent-color)"
  # Background
  background-color: "#3b4049"
  primary-background-color: "var(--background-color)"
  background-color-2: "#383e47"
  secondary-background-color: "var(--background-color-2)"
  markdown-code-background-color: "var(--background-color)"
  # Dialog
  ha-dialog-surface-backdrop-filter: var(--ha-card-backdrop-filter)
  # Header
  app-header-backdrop-filter: var(--ha-card-backdrop-filter)
  # Card
  card-background-color: "var(--ha-card-background)"
  ha-card-background: "rgba(22, 25, 23, 1)"
  ha-card-border-radius: "20px"
  ha-card-backdrop-filter: blur(20px)
  border-color: "#5f7575"
  ha-card-box-shadow: 0.5px 0.5px 1px 0px rgba(255, 255, 255, 0.40) inset, -0.5px -0.5px 1px 0px rgba(255, 255, 255, 0.10) inset, 0px 1px 2px 0px rgba(0, 0, 0, 0.10)
  # Icons
  paper-item-icon-color: "var(--text-color)"
  paper-item-icon-active-color: "var(--accent-color)"
  # Left Menu
  paper-listbox-background-color: "rgba(43, 45, 45, 1)"
  sidebar-background-color: "var(--paper-listbox-background-color)"
  sidebar-icon-color: "var(--secondary-text-color)"
  sidebar-selected-icon-color: "var(--accent-color)"
  sidebar-selected-text-color: "var(--text-color)"
  divider-color: "var(--background-color)"
  light-primary-color: "var(--accent-color)"
  # Sliders
  paper-slider-knob-color: "var(--accent-color)"
  paper-slider-pin-color: "var(--border-color)"
  paper-slider-active-color: "var(--border-color)"
  paper-slider-container-color: "var(--ha-card-background)"
  # Toggle
  paper-toggle-button-checked-bar-color: "var(--accent-color)"
  mdc-theme-primary: "var(--accent-color)"
  # Switch
  switch-unchecked-color: "var(--text-medium-color)"
  switch-checked-button-color: "var(--accent-color)"
  switch-unchecked-track-color: "var(--border-color)"
  switch-checked-track-color: "var(--border-color)"
  # Radio Button
  paper-radio-button-checked-color: "var(--accent-color)"
  # Popups
  more-info-header-background: "var(--secondary-background-color)"
  paper-dialog-background-color: "var(--background-color)"
  # Tables
  table-row-background-color: "var(--background-color)"
  table-row-alternative-background-color: "var(--ha-card-background)"
  # Badges
  label-badge-background-color: "var(--background-color)"
  label-badge-text-color: "var(--text-primary-color)"
  label-badge-red: "rgba(73,85,108,1)"
  label-badge-blue: "rgba(26,137,245,1)"
  label-badge-green: "rgba(0,202,139,1)"
  label-badge-yellow: "rgba(222,176,107,1)"
  paper-input-container-focus-color: "var(--accent-color)"
  # Custom Header
  ch-background: "rgba(69, 74, 83, 0.8)"
  ch-active-tab-color: "var(--accent-color)"
  ch-notification-dot-color: "var(--accent-color)"
  ch-all-tabs-color: "var(--sidebar-icon-color)"
  ch-tab-indicator-color: "var(--accent-color)"
  # Mini Mediaplayer
  mini-media-player-base-color: "var(--text-color)"
  mini-media-player-accent-color: "var(--accent-color)"
  # Bubble Card — inherits CN palette so any custom:bubble-card looks branded
  bubble-accent-color: "var(--accent-color)"
  bubble-border-radius: "var(--ha-card-border-radius)"
  bubble-main-background-color: "var(--ha-card-background)"
  bubble-secondary-background-color: "var(--background-color-2)"
  bubble-button-background-color: "var(--ha-card-background)"
  bubble-icon-background-color: "rgba(21, 199, 180, 0.15)"
  bubble-main-text-color: "var(--primary-text-color)"
  bubble-secondary-text-color: "var(--secondary-text-color)"
