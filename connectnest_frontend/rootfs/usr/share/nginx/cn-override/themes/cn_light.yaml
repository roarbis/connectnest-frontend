cn_light:
  card-mod-theme: cn_light
  card-mod-sidebar-yaml: |
    .: |
      .menu .title {
        display: none !important;
      }
      .menu:after {
        content: "Connect Hub";
        margin-left: 1px;
        color: rgba(21,199,180,1);
        background-color: rgba(240,246,244,1);
        display: block;
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        font-size: 30px;
        font-family: baumans;
      }
  # Global
  background-image: "none"
  lovelace-background: "var(--primary-background-color)"
  # Fonts
  primary-font-family: "Raleway,sans-serif"
  paper-font-common-base_-_font-family: "var(--primary-font-family)"
  paper-font-common-code_-_font-family: "var(--primary-font-family)"
  paper-font-body1_-_font-family: "var(--primary-font-family)"
  paper-font-subhead_-_font-family: "var(--primary-font-family)"
  paper-font-headline_-_font-family: "var(--primary-font-family)"
  paper-font-caption_-_font-family: "var(--primary-font-family)"
  paper-font-title_-_font-family: "var(--primary-font-family)"
  ha-card-header-font-family: "var(--primary-font-family)"
  # Text
  text-color: "#1a2a28"
  primary-text-color: "var(--text-color)"
  text-primary-color: "var(--text-color)"
  secondary-text-color: "#4a6660"
  text-medium-light-color: "#6b8680"
  text-medium-color: "#8a9e9a"
  disabled-text-color: "#b0bab8"
  primary-color: "var(--accent-color)"
  # Text Fields and Dropdown
  mdc-text-field-fill-color: "#eef3f1"
  mdc-text-field-ink-color: "var(--text-color)"
  mdc-select-fill-color: "#eef3f1"
  mdc-text-field-label-ink-color: "var(--secondary-text-color)"
  input-fill-color: "#eef3f1"
  input-ink-color: "var(--text-color)"
  input-label-ink-color: "var(--secondary-text-color)"
  input-disabled-fill-color: "#f5f7f6"
  input-disabled-ink-color: "var(--disabled-text-color)"
  input-disabled-label-ink-color: "var(--disabled-text-color)"
  input-idle-line-color: "#c8d8d4"
  input-dropdown-icon-color: "var(--secondary-text-color)"
  input-hover-line-color: "var(--accent-color)"
  code-editor-background-color: "#eef3f1"
  codemirror-property: "var(--accent-color)"
  # Main Colors
  app-header-background-color: "#2c443c"
  accent-color: "#15C7B4"
  accent-medium-color: "var(--accent-color)"
  # Background
  background-color: "#f0f6f4"
  primary-background-color: "var(--background-color)"
  background-color-2: "#e8f0ed"
  secondary-background-color: "var(--background-color-2)"
  markdown-code-background-color: "#eef3f1"
  # Dialog
  ha-dialog-surface-backdrop-filter: var(--ha-card-backdrop-filter)
  # Header
  app-header-backdrop-filter: none
  # Card
  card-background-color: "var(--ha-card-background)"
  ha-card-background: "#ffffff"
  ha-card-border-radius: "20px"
  ha-card-backdrop-filter: none
  border-color: "#c8d8d4"
  ha-card-box-shadow: 0px 2px 8px 0px rgba(26, 42, 40, 0.08), 0px 0px 1px 0px rgba(26, 42, 40, 0.12)
  # Icons
  paper-item-icon-color: "var(--secondary-text-color)"
  paper-item-icon-active-color: "var(--accent-color)"
  # Left Menu
  paper-listbox-background-color: "#ffffff"
  sidebar-background-color: "var(--paper-listbox-background-color)"
  sidebar-icon-color: "var(--secondary-text-color)"
  sidebar-selected-icon-color: "var(--accent-color)"
  sidebar-selected-text-color: "var(--text-color)"
  divider-color: "#e0eae7"
  light-primary-color: "var(--accent-color)"
  # Sliders
  paper-slider-knob-color: "var(--accent-color)"
  paper-slider-pin-color: "var(--accent-color)"
  paper-slider-active-color: "var(--accent-color)"
  paper-slider-container-color: "#c8d8d4"
  # Toggle
  paper-toggle-button-checked-bar-color: "var(--accent-color)"
  mdc-theme-primary: "var(--accent-color)"
  # Switch
  switch-unchecked-color: "#b0bab8"
  switch-checked-button-color: "var(--accent-color)"
  switch-unchecked-track-color: "#c8d8d4"
  switch-checked-track-color: "rgba(21,199,180,0.3)"
  # Radio Button
  paper-radio-button-checked-color: "var(--accent-color)"
  # Popups
  more-info-header-background: "var(--secondary-background-color)"
  paper-dialog-background-color: "#ffffff"
  # Tables
  table-row-background-color: "var(--background-color)"
  table-row-alternative-background-color: "#ffffff"
  # Badges
  label-badge-background-color: "var(--background-color)"
  label-badge-text-color: "var(--text-primary-color)"
  label-badge-red: "rgba(220,80,80,1)"
  label-badge-blue: "rgba(26,137,245,1)"
  label-badge-green: "rgba(0,180,120,1)"
  label-badge-yellow: "rgba(200,150,60,1)"
  paper-input-container-focus-color: "var(--accent-color)"
  # Custom Header
  ch-background: "rgba(255,255,255,0.92)"
  ch-active-tab-color: "var(--accent-color)"
  ch-notification-dot-color: "var(--accent-color)"
  ch-all-tabs-color: "var(--sidebar-icon-color)"
  ch-tab-indicator-color: "var(--accent-color)"
  # Mini Mediaplayer
  mini-media-player-base-color: "var(--text-color)"
  mini-media-player-accent-color: "var(--accent-color)"
