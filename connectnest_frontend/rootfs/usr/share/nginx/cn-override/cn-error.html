<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Nest — Connecting...</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/cn-icon-180.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Connect Nest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Baumans&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Raleway', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #2c443c;
      color: #cddada;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 24px;
      padding: 1rem;
      text-align: center;
    }
    .logo-wrap {
      width: 96px;
      height: 96px;
      animation: pulse 2s ease-in-out infinite;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
    h1 {
      font-family: 'Baumans', 'Raleway', sans-serif;
      font-size: 1.75rem;
      font-weight: 400;
      color: #15c7b4;
      letter-spacing: 0.05em;
    }
    .tagline {
      font-size: 0.95rem;
      color: #cddada;
      opacity: 0.8;
      font-weight: 300;
      letter-spacing: 0.04em;
      margin-top: -8px;
    }
    .dot-loader { display: flex; gap: 8px; }
    .dot-loader span {
      width: 10px;
      height: 10px;
      background: #15c7b4;
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
    .dot-loader span:nth-child(3) { animation-delay: 0.4s; }
    .status {
      font-size: 0.95rem;
      opacity: 0.7;
      max-width: 320px;
      line-height: 1.6;
    }
    .help {
      margin-top: 16px;
      font-size: 0.8rem;
      opacity: 0.5;
    }
    .help a {
      color: #15c7b4;
      text-decoration: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(0.95); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-12px); }
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="/static/icons/cn-icon-192.png" alt="Connect Nest">
  </div>
  <h1>Connect Nest</h1>
  <p class="tagline">Turn On Smart Living</p>
  <div class="dot-loader">
    <span></span><span></span><span></span>
  </div>
  <p class="status">Your smart home is starting up.<br>This usually takes less than a minute.</p>
  <script>
    // Auto-reload once HA is back
    setTimeout(() => location.reload(), 8000);
  </script>
</body>
</html>
